<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Material - Sistem Antrean Sampel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">LAB MATERIAL</h1>
                <p class="subtitle">Sistem Antrean Sampel Laboratorium</p>
            </div>
        </header>

        <!-- Stats Bar -->
        <div class="stats">
            <div class="stat">
                <span class="stat-label">Antrean</span>
                <span class="stat-value" id="queueCount">0</span>
            </div>
            <div class="stat separator"></div>
            <div class="stat">
                <span class="stat-label">Selesai</span>
                <span class="stat-value" id="historyCount">0</span>
            </div>
            <div class="stat separator"></div>
            <div class="stat">
                <span class="stat-label">Total</span>
                <span class="stat-value" id="totalCount">0</span>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="grid">
            <!-- Left Column -->
            <div class="column">
                <!-- Quick Actions -->
                <section class="section">
                    <h2 class="section-title">Aksi</h2>
                    <div class="button-group">
                        <button id="processBtn" class="btn btn-primary">
                            Proses Sampel
                        </button>
                        <button id="searchBtn" class="btn btn-secondary">
                            Cari Sampel
                        </button>
                        <button id="clearAllBtn" class="btn btn-danger">
                            Reset Semua
                        </button>
                    </div>
                </section>

                <!-- Add Sample Form -->
                <section class="section">
                    <h2 class="section-title">Tambah Sampel</h2>
                    <form id="addSampleForm" class="form">
                        <div class="form-group">
                            <label>Nama Pengirim</label>
                            <input type="text" id="pengirim" placeholder="PT. ABC Industri" required>
                        </div>
                        <div class="form-group">
                            <label>Jenis Uji</label>
                            <select id="jenisUji" required>
                                <option value="">-- Pilih --</option>
                                <option value="1">Uji Tarik</option>
                                <option value="2">Uji Tekan</option>
                                <option value="3">Uji Kekerasan</option>
                                <option value="4">Uji Impak</option>
                                <option value="5">Uji Lentur</option>
                                <option value="6">Uji Kelelahan</option>
                                <option value="7">Uji Korosi</option>
                                <option value="8">Metalografi</option>
                                <option value="9">Analisis Komposisi</option>
                                <option value="10">Analisis Termal</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Jadwal</label>
                            <input type="datetime-local" id="jadwal" required>
                        </div>
                        <button type="submit" class="btn btn-submit">Tambah ke Antrean</button>
                    </form>
                </section>
            </div>

            <!-- Right Column -->
            <div class="column">
                <!-- Queue -->
                <section class="section">
                    <h2 class="section-title">Antrean Aktif</h2>
                    <div id="queueList" class="list">
                        <p class="empty-state">Belum ada sampel dalam antrean</p>
                    </div>
                </section>

                <!-- History -->
                <section class="section">
                    <h2 class="section-title">Riwayat Selesai</h2>
                    <div id="historyList" class="list">
                        <p class="empty-state">Belum ada sampel yang selesai</p>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <!-- Modal: Search -->
    <div id="searchModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Cari Sampel</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="searchInput" placeholder="Masukkan kode sampel (SPL-XXXX)" class="search-input">
                <div id="searchResults" class="search-results"></div>
            </div>
        </div>
    </div>

    <!-- Modal: Confirmation -->
    <div id="confirmModal" class="modal">
        <div class="modal-content small">
            <div class="modal-header">
                <h2>Konfirmasi</h2>
            </div>
            <div class="modal-body">
                <p id="confirmMessage"></p>
            </div>
            <div class="modal-footer">
                <button id="confirmYes" class="btn btn-primary">Ya</button>
                <button id="confirmNo" class="btn btn-secondary">Batal</button>
            </div>
        </div>
    </div>

    <script src="linkedlist.js"></script>
    <script src="app.js"></script>
</body>
</html>
